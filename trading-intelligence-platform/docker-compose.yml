# Local dev compose for the Trading Intelligence Platform.
# `api` and `frontend` are wired to real code — the `worker` (scheduled
# pattern/negation/scoring pipeline) described in docs/architecture.md is
# still later-phase work; see docs/deployment_guide.md.
#
# `api` builds from ./Dockerfile (TA-Lib's C library needs compiling —
# python:3.11-slim's apt repos don't carry it, see Dockerfile's own
# comment) rather than an inline python:3.11-slim + pip install.
#
# READ-ONLY REMINDER: KITE_API_KEY / KITE_ACCESS_TOKEN must only ever be
# provisioned with read-only market-data scope. No service in this file
# places, modifies, or cancels a broker order. See docs/CLAUDE.md section 2.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             alembic upgrade head &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      DATABASE_URL: postgresql+psycopg://tip:tip@timescaledb:5432/tip
      REDIS_URL: redis://redis:6379/0
      KITE_API_KEY: ${KITE_API_KEY:-}
      KITE_ACCESS_TOKEN: ${KITE_ACCESS_TOKEN:-}
      DATA_MODE: ${DATA_MODE:-sample}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./database:/app/database
      - ./requirements.txt:/app/requirements.txt
      - ./tests:/app/tests
      - ./pytest.ini:/app/pytest.ini
      - ./scripts:/app/scripts
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_started

  timescaledb:
    image: timescale/timescaledb:2.14.2-pg15
    environment:
      POSTGRES_USER: tip
      POSTGRES_PASSWORD: tip
      POSTGRES_DB: tip
    ports:
      - "5432:5432"
    # Schema is applied by the `api` service's `alembic upgrade head` step
    # (alembic/versions/0001_initial_schema.py runs database/schema.sql),
    # not by a docker-entrypoint-initdb.d mount — a fresh volume would
    # otherwise get the schema applied twice (once here, once by Alembic)
    # and the second application would fail on "relation already exists".
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tip"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  frontend:
    image: node:20-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api

  # Phase 8 (F8.3) monitoring — scrapes the `api` service's GET /metrics.
  # Local-only, same posture as every other service in this file: no auth,
  # no public exposure (docs/CLAUDE.md section 10).
  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.3.1
    ports:
      - "3001:3000"
    environment:
      # Single-founder local deployment — a fixed default login, not a
      # secret worth externalizing (change it in the UI if this ever moves
      # off localhost).
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  timescaledb_data:
  redis_data:
  frontend_node_modules:
  prometheus_data:
  grafana_data:
