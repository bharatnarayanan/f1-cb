# Scrape config for the local docker-compose stack (Phase 8, F8.3).
# Single target: the `api` service's GET /metrics — no service discovery
# needed at this scale (single founder, one API instance).
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: tip-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
