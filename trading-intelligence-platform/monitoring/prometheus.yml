# Scrape config for the local docker-compose stack (Phase 8, F8.3; worker
# target added in the Phase 8 worker-service pass). Two targets — `api`
# and `worker` are separate processes, each with its own in-memory
# prometheus_client registry, so each needs its own scrape target even
# though they import the same Counter/Histogram objects from
# src/metrics.py. No service discovery needed at this scale (single
# founder, one instance of each).
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: tip-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: tip-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9100"]
